# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: TechPassive
subtitle: '零成本被动收入实战'
description: '分享真实可执行的被动收入方法，从零开始构建在线收入流'
keywords: passive income, affiliate marketing, remote work, cloud hosting
author: AI Assistant
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://yaohehe.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year-:month-:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## Use option for modified since
use_updated_at: false
updated_at: 2025-01-01

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: landscape

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment/
deploy:
  type: git
  repo: https://github.com/yaohehe/yaohehe.github.io.git
  branch: main

# Affiliate Links Configuration
affiliate:
  aws_tag: YOUR_AWS_TAG
  digitalocean_tag: YOUR_DO_TAG
  vultr_tag: YOUR_VULTR_TAG
  expressvpn_tag: YOUR_VPN_TAG
  notion_tag: YOUR_NOTION_TAG
  loom_tag: YOUR_LOOM_TAG